<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>六爻起卦小游戏（物理三硬币版）</title>
  <style>
    :root {
      --bg: #0b0f17;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.10);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --gold1: #f6d98b;
      --gold2: #d8a93f;
      --gold3: #b8841d;
      --silver1: #e8eef6;
      --silver2: #b9c5d4;
      --silver3: #8d98a8;
      --ok: #8fe3b8;
      --warn: #ffd38a;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color: var(--text);
      background: radial-gradient(1200px 700px at 50% 20%, #19223a 0%, var(--bg) 55%, #070a10 100%);
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .app {
      width: min(1160px, 96vw);
      display: grid;
      grid-template-columns: 1.28fr .92fr;
      gap: 16px;
      align-items: stretch;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 22px;
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 70px rgba(0,0,0,.28);
      overflow: hidden;
    }
    .left {
      min-height: 780px;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 18px 18px 0 18px;
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: .4px;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }
    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .stage {
      position: relative;
      padding: 12px 18px 8px;
      display: grid;
    }
    .resultBox {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,.20);
      border: 1px solid rgba(255,255,255,.10);
      margin-bottom: 10px;
    }
    .big {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .small {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    .physicsArea {
      position: relative;
      min-height: 600px;
      border-radius: 20px;
      overflow: hidden;
      background:
        radial-gradient(800px 320px at 50% 0%, rgba(255,255,255,.06), rgba(255,255,255,0)),
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.08);
      cursor: crosshair;
      touch-action: none;
    }
    .physicsArea::after {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 52px;
      height: 1px;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.16), rgba(255,255,255,0));
      pointer-events: none;
    }
    .tipFloat {
      display: none;
    }
    .shadow {
      position: absolute;
      width: 110px;
      height: 22px;
      border-radius: 999px;
      background: radial-gradient(closest-side, rgba(0,0,0,.58), rgba(0,0,0,0));
      filter: blur(2px);
      transform: translate(-50%, -50%);
      opacity: .50;
      pointer-events: none;
      z-index: 1;
    }
    .coinWrap {
      position: absolute;
      width: 118px;
      height: 118px;
      perspective: 900px;
      transform: translate(-50%, -50%);
      z-index: 2;
      cursor: grab;
      touch-action: none;
      will-change: transform, left, top;
    }
    .coinWrap:active {
      cursor: grabbing;
    }
    .coin {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      border-radius: 50%;
      will-change: transform;
    }
    .face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 28px;
      letter-spacing: 1px;
      color: rgba(0,0,0,.78);
      backface-visibility: hidden;
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      overflow: hidden;
    }
    .heads {
      background:
        radial-gradient(120px 120px at 35% 30%, rgba(255,255,255,.90), rgba(255,255,255,0) 60%),
        radial-gradient(180px 180px at 50% 70%, rgba(255,255,255,.25), rgba(255,255,255,0) 60%),
        linear-gradient(145deg, var(--gold1) 0%, var(--gold2) 42%, #f0d07a 72%, var(--gold3) 100%);
    }
    .tails {
      transform: rotateX(180deg) translateZ(1px);
      background:
        radial-gradient(120px 120px at 35% 30%, rgba(255,255,255,.90), rgba(255,255,255,0) 60%),
        radial-gradient(180px 180px at 50% 70%, rgba(255,255,255,.25), rgba(255,255,255,0) 60%),
        linear-gradient(145deg, var(--silver1) 0%, var(--silver2) 42%, #dfe7f2 72%, var(--silver3) 100%);
    }
    .rim {
      position: absolute;
      inset: 7px;
      border-radius: 50%;
      border: 2px solid rgba(0,0,0,.18);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.18);
      pointer-events: none;
    }
    .coinTag {
      display: none;
    }
    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 0 18px 18px;
    }
    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: var(--text);
      padding: 11px 14px;
      border-radius: 12px;
      font-weight: 750;
      letter-spacing: .2px;
      cursor: pointer;
      transition: transform .06s ease, background .2s ease, border-color .2s ease;
    }
    button:hover { background: rgba(255,255,255,.11); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: not-allowed; }

    .side {
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }
    .sideCard {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 14px 14px;
    }
    .sideTitle {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .tips {
      font-size: 12px;
      line-height: 1.65;
      color: var(--muted);
    }
    .history {
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .historyItem {
      border-radius: 14px;
      padding: 10px 12px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 12px;
      align-items: center;
    }
    .historyItem .idx {
      width: 64px;
      font-size: 12px;
      color: var(--muted);
    }
    .historyItem .desc {
      font-size: 15px;
      line-height: 1.45;
      font-weight: 700;
    }
    .historyItem .desc b {
      font-size: 15px;
    }

    .empty {
      padding: 18px 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .guaWrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .guaBox {
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 12px;
    }
    .guaName {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .lines {
      display: grid;
      gap: 8px;
    }
    .yao {
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
    }
    .yao .seg {
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 0 0 1px rgba(255,255,255,.05);
    }
    .yao.yang .seg.full {
      width: 100%;
    }
    .yao.yin .seg.half {
      width: calc(50% - 8px);
    }
    .mark {
      position: absolute;
      right: -2px;
      top: -5px;
      font-size: 12px;
      color: var(--warn);
      font-weight: 800;
    }
    .footerHint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.65;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .left { min-height: auto; }
      .physicsArea { min-height: 520px; }
    }
    @media (max-width: 640px) {
      .topbar { flex-direction: column; }
      .coinWrap { width: 92px; height: 92px; }
      .shadow { width: 84px; }
      .face { font-size: 24px; }
      .physicsArea { min-height: 460px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="app">
      <section class="panel left">
        <div class="topbar">
          <div>
            <div class="title">六爻起卦小游戏</div>
            <div class="sub">每次落定自动记录一爻，六次成卦。</div>
          </div>
          <div class="badge" id="progressBadge">当前：第 1 次 / 共 6 次</div>
        </div>

        <div class="stage">
          <div class="resultBox">
            <div>
              <div class="big" id="resultText">开始起卦</div>
              <div class="small" id="resultSub"></div>
            </div>
            <div class="badge" id="statePill">待机</div>
          </div>

          <div class="physicsArea" id="stageArea">
            <div class="shadow" id="shadow0"></div>
            <div class="shadow" id="shadow1"></div>
            <div class="shadow" id="shadow2"></div>

            <div class="coinWrap" id="coinWrap0">
              <div class="coin" id="coin0">
                <div class="face heads">正<div class="rim"></div></div>
                <div class="face tails">反<div class="rim"></div></div>
              </div>
            </div>
            <div class="coinWrap" id="coinWrap1">
              <div class="coin" id="coin1">
                <div class="face heads">正<div class="rim"></div></div>
                <div class="face tails">反<div class="rim"></div></div>
              </div>
            </div>
            <div class="coinWrap" id="coinWrap2">
              <div class="coin" id="coin2">
                <div class="face heads">正<div class="rim"></div></div>
                <div class="face tails">反<div class="rim"></div></div>
              </div>
            </div>

            <div class="coinTag" id="coinText0">第一枚</div>
            <div class="coinTag" id="coinText1">第二枚</div>
            <div class="coinTag" id="coinText2">第三枚</div>

          </div>
        </div>

        <div class="controls">
          <button id="btnClear">清空六爻</button>
          <button id="btnCenter">回到中间</button>
        </div>
      </section>

      <aside class="panel side">
        <div class="sideCard">
          <div class="sideTitle">六爻记录</div>
          <div class="history" id="historyList"></div>
        </div>


        <div class="sideCard">
          <div class="sideTitle">成爻规则</div>
          <div class="tips">
            三正：老阳<br>
            两正一反：少阴<br>
            一正两反：少阳<br>
            三反：老阴
          </div>
        </div>

        <div class="sideCard">
          <div class="sideTitle">卦形预览</div>
          <div class="guaWrap">
            <div class="guaBox">
              <div class="guaName">本卦</div>
              <div class="lines" id="mainHex"></div>
            </div>
            <div class="guaBox">
              <div class="guaName">变卦</div>
              <div class="lines" id="changedHex"></div>
            </div>
          </div>
        </div>

      </aside>
    </div>
  </div>

  
  <script>
    (() => {
      const stage = document.getElementById("stageArea");
      const resultText = document.getElementById("resultText");
      const resultSub = document.getElementById("resultSub");
      const statePill = document.getElementById("statePill");
      const progressBadge = document.getElementById("progressBadge");
      const historyList = document.getElementById("historyList");
      const mainHex = document.getElementById("mainHex");
      const changedHex = document.getElementById("changedHex");

      const btnClear = document.getElementById("btnClear");
      const btnCenter = document.getElementById("btnCenter");

      const laneOffsets = [-110, 0, 110];
      const laneNames = ["第一枚", "第二枚", "第三枚"];
      const lineNames = ['初爻', '二爻', '三爻', '四爻', '五爻', '上爻'];

      const coinUIs = [0, 1, 2].map(i => ({
        wrap: document.getElementById(`coinWrap${i}`),
        coin: document.getElementById(`coin${i}`),
        shadow: document.getElementById(`shadow${i}`),
        text: document.getElementById(`coinText${i}`)
      }));

      const clamp = (x, a, b) => Math.max(a, Math.min(b, x));
      const lerp  = (a, b, t) => a + (b - a) * t;

      function csprngU32() {
        const u = new Uint32Array(1);
        if (globalThis.crypto?.getRandomValues) {
          crypto.getRandomValues(u);
          return u[0] >>> 0;
        }
        let x = (Date.now() ^ ((performance.now() * 1000) | 0)) >>> 0;
        x ^= x << 13; x ^= x >>> 17; x ^= x << 5;
        return x >>> 0;
      }

      function mix32(x) {
        x >>>= 0;
        x ^= x >>> 16;
        x = Math.imul(x, 0x7feb352d) >>> 0;
        x ^= x >>> 15;
        x = Math.imul(x, 0x846ca68b) >>> 0;
        x ^= x >>> 16;
        return x >>> 0;
      }

      function makeRng(seedU32) {
        let x = (seedU32 >>> 0) || 0x12345678;
        return {
          u() {
            x ^= (x << 13) >>> 0;
            x ^= (x >>> 17) >>> 0;
            x ^= (x << 5) >>> 0;
            return (x >>> 0) / 4294967296;
          },
          s() {
            return this.u() * 2 - 1;
          }
        };
      }

      function rngFromSeed(seedU32) {
        return makeRng(mix32(seedU32 >>> 0));
      }

      const g = 2400;
      const AIR_BASE = 0.10;
      const BOUNCE_BASE = 0.52;
      const FLOOR_FRICTION_BASE = 0.78;
      const SPIN_FRICTION_BASE  = 0.76;
      const SPIN_AIR_BASE = 0.085;
      const VY_STOP = 26;
      const AV_STOP = 1.4;

      function makeCoinState(i) {
        return {
          index: i,
          y: 0,
          vy: 0,
          angle: 0,
          av: 0,
          coinX: 0,
          vx: 0,
          running: false,
          settled: true,
          calmFrames: 0,
          tossSeed: 0,
          tossRng: null,
          pAir: AIR_BASE,
          pBounce: BOUNCE_BASE,
          pFloorFriction: FLOOR_FRICTION_BASE,
          pSpinFriction: SPIN_FRICTION_BASE,
          pSpinAir: SPIN_AIR_BASE,
          pKick: 0.10,
          pTorqueNoise: 0.28,
          pVxNoise: 16,
          result: null,
          rafId: 0
        };
      }

      const states = [0, 1, 2].map(makeCoinState);
      const tossHistory = [];

      let restAnchorX = 0;
      let restAnchorY = 0;
      let spreadFactor = 1;
      let collapseTargetIndex = 1;
      let spreadAnimId = 0;
      let moveAnimId = 0;

      let dragging = false;
      let groupRunning = false;
      let preTossAnimating = false;
      let preTossTimer = 0;
      let holdCollapsed = false;
      let activePointerId = null;
      let lastPX = 0, lastPY = 0, lastPT = 0;
      let vEstX = 0, vEstY = 0;
      let dragDistance = 0;

      function setState(text) {
        statePill.textContent = text;
      }

      function updateBoundsAndClamp() {
        const w = stage.clientWidth;
        const h = stage.clientHeight;
        if (!restAnchorX || !restAnchorY) {
          restAnchorX = w * 0.5;
          restAnchorY = h * 0.72;
        }
        restAnchorX = clamp(restAnchorX, 160, w - 160);
        restAnchorY = clamp(restAnchorY, 210, h - 90);
      }

      function sampleTossParams(state, rng) {
        state.pAir = AIR_BASE * (1 + rng.s() * 0.22);
        state.pBounce = clamp(BOUNCE_BASE + rng.s() * 0.06, 0.35, 0.75);
        state.pFloorFriction = clamp(FLOOR_FRICTION_BASE + rng.s() * 0.06, 0.55, 0.95);
        state.pSpinFriction = clamp(SPIN_FRICTION_BASE + rng.s() * 0.06, 0.55, 0.95);
        state.pSpinAir = clamp(SPIN_AIR_BASE * (1 + rng.s() * 0.25), 0.03, 0.18);
        state.pKick = 0.10 * (1 + rng.s() * 0.55);
        state.pTorqueNoise = 0.28 * (1 + rng.s() * 0.70);
        state.pVxNoise = 16 * (1 + rng.s() * 0.80);
      }

      function renderCoin(state) {
        const idx = state.index;
        const ui = coinUIs[idx];
        const merged = 1 - spreadFactor;

        const lane = laneOffsets[idx] * spreadFactor;
        const collapseBaseX = restAnchorX + laneOffsets[collapseTargetIndex] * merged;
        const stackYOffset = idx === collapseTargetIndex ? 0 : (-10 + idx * 8) * merged;
        const cx = collapseBaseX + lane + state.coinX;
        const cy = restAnchorY - state.y + stackYOffset;

        const mergeScale = idx === collapseTargetIndex
          ? (1 + 0.08 * merged)
          : (1 - 0.28 * merged);

        const sc = (1 + clamp(state.y / 1000, 0, 0.12)) * mergeScale;
        const rz = clamp(state.vx / 900, -10, 10);

        ui.wrap.style.left = `${cx}px`;
        ui.wrap.style.top = `${cy}px`;
        ui.wrap.style.transform = `translate(-50%, -50%) scale(${sc})`;
        ui.coin.style.transform = `rotateX(${state.angle * 180 / Math.PI}deg) rotateZ(${rz}deg)`;

        const coinOpacity = idx === collapseTargetIndex ? 1 : (1 - 0.82 * merged);
        ui.coin.style.opacity = `${coinOpacity}`;
        ui.wrap.style.zIndex = String(idx === collapseTargetIndex ? 30 : (10 + idx));

        const shScale = clamp(1 - state.y / 520, 0.25, 1) * (0.92 + 0.08 * spreadFactor);
        const shOpBase = clamp(0.62 - state.y / 900, 0.10, 0.62);
        const shOpacity = idx === collapseTargetIndex ? shOpBase : shOpBase * (1 - 0.72 * merged);

        ui.shadow.style.left = `${collapseBaseX + lane + state.coinX}px`;
        ui.shadow.style.top = `${restAnchorY + 58}px`;
        ui.shadow.style.transform = `translate(-50%, -50%) scale(${shScale})`;
        ui.shadow.style.opacity = `${shOpacity}`;

        ui.text.style.left = `${collapseBaseX + lane + state.coinX}px`;
        ui.text.style.top = `${restAnchorY + 102}px`;
        ui.text.style.opacity = spreadFactor < 0.18 ? "0" : String(clamp((spreadFactor - 0.12) / 0.88, 0, 1));
      }

      function renderAll() {
        states.forEach(renderCoin);
      }

      function animateValue({ from, to, duration, onUpdate, onDone }) {
        const t0 = performance.now();
        function step(t) {
          const u = clamp((t - t0) / duration, 0, 1);
          const e = 1 - Math.pow(1 - u, 3);
          onUpdate(lerp(from, to, e), u);
          if (u < 1) {
            requestAnimationFrame(step);
          } else if (onDone) {
            onDone();
          }
        }
        requestAnimationFrame(step);
      }

      function animateSpreadTo(target, duration = 260) {
        if (spreadAnimId) cancelAnimationFrame(spreadAnimId);
        const start = spreadFactor;
        const t0 = performance.now();
        function step(t) {
          const u = clamp((t - t0) / duration, 0, 1);
          const e = 1 - Math.pow(1 - u, 3);
          spreadFactor = lerp(start, target, e);
          renderAll();
          if (u < 1) {
            spreadAnimId = requestAnimationFrame(step);
          } else {
            spreadAnimId = 0;
          }
        }
        spreadAnimId = requestAnimationFrame(step);
      }

      function animateMoveAndCollapse(px, py) {
        updateBoundsAndClamp();
        if (moveAnimId) cancelAnimationFrame(moveAnimId);

        const startX = restAnchorX;
        const startY = restAnchorY;
        const targetX = clamp(px, 160, stage.clientWidth - 160);
        const targetY = clamp(py, 210, stage.clientHeight - 90);
        const startSpread = spreadFactor;

        const phase1Start = performance.now();
        const phase1Dur = 220;
        const midX = lerp(startX, targetX, 0.28);
        const midY = lerp(startY, targetY, 0.28);

        function phase1(t) {
          const u = clamp((t - phase1Start) / phase1Dur, 0, 1);
          const e = 1 - Math.pow(1 - u, 3);

          restAnchorX = lerp(startX, midX, e);
          restAnchorY = lerp(startY, midY, e);
          spreadFactor = lerp(startSpread, 0, e);

          states.forEach(s => {
            s.coinX *= 0.55;
            s.y = 0;
            s.vx *= 0.4;
            s.vy = 0;
          });

          renderAll();

          if (u < 1) {
            moveAnimId = requestAnimationFrame(phase1);
            return;
          }

          const phase2Start = performance.now();
          const phase2Dur = 240;

          function phase2(tt) {
            const uu = clamp((tt - phase2Start) / phase2Dur, 0, 1);
            const ee = 1 - Math.pow(1 - uu, 3);

            restAnchorX = lerp(midX, targetX, ee);
            restAnchorY = lerp(midY, targetY, ee);
            spreadFactor = 0;

            renderAll();

            if (uu < 1) {
              moveAnimId = requestAnimationFrame(phase2);
            } else {
              moveAnimId = 0;
            }
          }

          moveAnimId = requestAnimationFrame(phase2);
        }

        moveAnimId = requestAnimationFrame(phase1);
      }

      function resetCoinLabels() {
        coinUIs.forEach((ui, idx) => {
          ui.text.textContent = laneNames[idx];
        });
      }

      function decideFaceFromAngle(a) {
        return (Math.cos(a) > 0) ? "正" : "反";
      }

      function settleToFace(state, face) {
        const twopi = Math.PI * 2;
        let target = 0;
        if (face === "正") {
          const k = Math.round(state.angle / twopi);
          target = k * twopi;
        } else {
          const k = Math.round((state.angle - Math.PI) / twopi);
          target = Math.PI + k * twopi;
        }

        const start = state.angle;
        const dur = 220;
        const t0 = performance.now();

        function step(t) {
          const u = clamp((t - t0) / dur, 0, 1);
          const e = 1 - Math.pow(1 - u, 3);
          state.angle = lerp(start, target, e);
          renderCoin(state);
          if (u < 1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
      }

      function lineInfoFromCoins(results) {
        const sum = results.reduce((acc, item) => acc + (item === '正' ? 3 : 2), 0);
        if (sum === 6) return { sum, name: '老阴', type: 'yin', changing: true, mark: '×' };
        if (sum === 7) return { sum, name: '少阳', type: 'yang', changing: false, mark: '' };
        if (sum === 8) return { sum, name: '少阴', type: 'yin', changing: false, mark: '' };
        return { sum, name: '老阳', type: 'yang', changing: true, mark: '○' };
      }

      function changedTypeOf(item) {
        if (!item.changing) return item.type;
        return item.type === 'yang' ? 'yin' : 'yang';
      }

      function yaoHtml(type, mark = '') {
        if (type === 'yang') {
          return `
            <div class="yao yang">
              <span class="seg full"></span>
              ${mark ? `<span class="mark">${mark}</span>` : ''}
            </div>
          `;
        }
        return `
          <div class="yao yin">
            <span class="seg half"></span>
            <span class="seg half"></span>
            ${mark ? `<span class="mark">${mark}</span>` : ''}
          </div>
        `;
      }

      function renderHexagrams() {
        if (!tossHistory.length) {
          mainHex.innerHTML = '<div class="empty">还没有记录。</div>';
          changedHex.innerHTML = '<div class="empty">还没有记录。</div>';
          return;
        }
        const linesBottomUp = tossHistory.map(item => item.info);
        const mainTopDown = [...linesBottomUp].reverse();
        const changedTopDown = [...linesBottomUp].map(changedTypeOf).reverse();

        mainHex.innerHTML = mainTopDown.map(item => yaoHtml(item.type, item.mark)).join('');
        changedHex.innerHTML = changedTopDown.map(type => yaoHtml(type)).join('');
      }

      function renderHistory() {
        if (!tossHistory.length) {
          historyList.innerHTML = '<div class="empty">还没有记录。</div>';
          return;
        }

        historyList.innerHTML = tossHistory.map((item, idx) => {
          const info = item.info;
          return `
            <div class="historyItem">
              <div class="idx">${lineNames[idx]}</div>
              <div class="desc">${info.name}</div>
            </div>
          `;
        }).reverse().join('');
      }

      function renderProgress() {
        const next = Math.min(tossHistory.length + 1, 6);
        progressBadge.textContent = tossHistory.length >= 6
          ? '当前：已满 6 次'
          : `当前：第 ${next} 次 / 共 6 次`;
      }

      function setIdleHint() {
        if (tossHistory.length >= 6) {
          resultText.textContent = '六爻已成';
          resultSub.textContent = '';
          setState('已满六爻');
        } else {
          resultText.textContent = '开始起卦';
          resultSub.textContent = '';
          setState('待机');
        }
      }

      function updateButtons() {
      }

      function onAllCoinsSettled(results) {
        const info = lineInfoFromCoins(results);
        const record = { coins: results, info };
        tossHistory.push(record);

        const n = tossHistory.length;
        resultText.textContent = `${lineNames[n - 1]}：${info.name}`;
        resultSub.textContent = '';

        renderHistory();
        renderHexagrams();
        renderProgress();
        updateButtons();

        if (tossHistory.length >= 6) {
          setState('已满六爻');
          resultText.textContent += '，六爻已记录完成';
        } else {
          setState('已记录');
        }
      }

      function maybeFinishGroup() {
        if (!groupRunning) return;
        const done = states.every(s => !s.running && s.result);
        if (!done) return;
        groupRunning = false;
        const results = states.map(s => s.result);
        onAllCoinsSettled(results);
      }

      function animateCoin(state) {
        let lastT = performance.now();
        const ui = coinUIs[state.index];

        function loop(t) {
          if (!state.running) return;
          const dt = clamp((t - lastT) / 1000, 0.001, 0.024);
          lastT = t;

          state.vy -= g * dt;
          state.y += state.vy * dt;

          state.vy *= (1 - state.pAir * dt);
          state.vx *= (1 - 0.55 * dt);
          state.av *= (1 - state.pSpinAir * dt);

          const airFactor = clamp(state.y / 180, 0, 1);
          state.vx += state.tossRng.s() * state.pVxNoise * airFactor * dt;
          state.av += state.tossRng.s() * state.pTorqueNoise * (0.35 + 0.65 * airFactor) * dt;

          state.angle += state.av * dt;

          if (state.y < 0) {
            state.y = 0;
            if (state.vy < 0) {
              state.vy = -state.vy * state.pBounce;
              state.vx *= state.pFloorFriction;
              state.av *= state.pSpinFriction;
              state.av += state.tossRng.s() * state.pKick;
            }
          }

          const low = (Math.abs(state.vy) < VY_STOP && Math.abs(state.av) < AV_STOP && state.y === 0);
          state.calmFrames = low ? (state.calmFrames + 1) : 0;

          if (state.calmFrames > 18) {
            state.running = false;
            state.settled = true;
            state.result = decideFaceFromAngle(state.angle);
            settleToFace(state, state.result);
            ui.text.textContent = state.result;
            renderCoin(state);
            maybeFinishGroup();
            return;
          }

          renderCoin(state);
          state.rafId = requestAnimationFrame(loop);
        }

        state.rafId = requestAnimationFrame(loop);
      }

      function startTripleToss({ initVy, initVx, initAv, initAngle, groupSeed }) {
        if (groupRunning || preTossAnimating || tossHistory.length >= 6) return;
        groupRunning = true;
        setState('飞行中');
        resultText.textContent = '起卦中';
        resultSub.textContent = '';
        updateButtons();

        spreadFactor = 0;
        renderAll();
        if (preTossTimer) {
          clearTimeout(preTossTimer);
          preTossTimer = 0;
        }
        preTossTimer = setTimeout(() => {
          animateSpreadTo(1, 220);
          preTossTimer = 0;
        }, 34);

        states.forEach((state, idx) => {
          if (state.rafId) cancelAnimationFrame(state.rafId);
          const seed = mix32((groupSeed + Math.imul(idx + 1, 0x9E3779B9)) >>> 0);
          const rng = rngFromSeed(seed);
          state.tossSeed = seed;
          state.tossRng = rng;
          sampleTossParams(state, rng);

          const laneVy = initVy * (1 + rng.s() * 0.045);
          const laneVx = initVx + rng.s() * 32 + (idx - 1) * 10;
          const laneAv = initAv * (1 + rng.s() * 0.035) + rng.s() * 1.2;
          const laneAngle = initAngle + idx * 0.12 + rng.s() * 0.04;

          const epsAngle = rng.s() * 0.006;
          const epsVy = rng.s() * 0.45;
          const epsVx = rng.s() * 1.8;
          const epsAv = rng.s() * 0.9;

          state.y = 0;
          state.vy = laneVy + epsVy;
          state.vx = laneVx + epsVx;
          state.angle = laneAngle + epsAngle;
          state.av = laneAv * (1 + rng.s() * 0.010) + epsAv;
          state.coinX = 0;
          state.running = true;
          state.settled = false;
          state.calmFrames = 0;
          state.result = null;

          coinUIs[idx].text.textContent = '飞行中';
          animateCoin(state);
        });
      }


      function resetCoinsPose() {
        if (spreadFactor > 0.98) collapseTargetIndex = 1;
        states.forEach((s, idx) => {
          if (s.rafId) cancelAnimationFrame(s.rafId);
          s.y = 0;
          s.vy = 0;
          s.coinX = 0;
          s.vx = 0;
          s.angle = 0.08 * (idx - 1);
          s.av = 0;
          s.running = false;
          s.settled = true;
          s.result = null;
        });
        resetCoinLabels();
        renderAll();
      }

      function clearAll() {
        if (groupRunning || preTossAnimating) return;
        holdCollapsed = false;
        collapseTargetIndex = 1;
        tossHistory.length = 0;
        renderHistory();
        renderHexagrams();
        renderProgress();
        setIdleHint();
        updateButtons();
        spreadFactor = 1;
        resetCoinsPose();
      }

      function centerCoins() {
        if (groupRunning || preTossAnimating) return;
        holdCollapsed = false;
        collapseTargetIndex = 1;
        restAnchorX = stage.clientWidth * 0.5;
        restAnchorY = stage.clientHeight * 0.72;
        spreadFactor = 1;
        resetCoinsPose();
        resultText.textContent = '已归中';
        resultSub.textContent = '';
        setState('已归中');
      }

      function getCoinTargetIndex(target) {
        const wrap = target.closest('.coinWrap');
        if (!wrap) return -1;
        const m = wrap.id.match(/coinWrap(\d+)/);
        return m ? Number(m[1]) : -1;
      }

      function isCoinTarget(target) {
        return getCoinTargetIndex(target) !== -1;
      }

      stage.addEventListener('pointerdown', (e) => {
        if (groupRunning || preTossAnimating || tossHistory.length >= 6) return;
        updateBoundsAndClamp();

        const rect = stage.getBoundingClientRect();
        const px = e.clientX - rect.left;
        const py = e.clientY - rect.top;

        activePointerId = e.pointerId;
        stage.setPointerCapture(e.pointerId);

        dragDistance = 0;
        lastPX = px;
        lastPY = py;
        lastPT = performance.now();
        vEstX = 0;
        vEstY = 0;

        const coinTargetIndex = getCoinTargetIndex(e.target);

        if (coinTargetIndex !== -1) {
          dragging = true;
          holdCollapsed = true;
          collapseTargetIndex = coinTargetIndex;
          states.forEach(s => {
            s.coinX = 0;
            s.y = 0;
            s.vy = 0;
          });
          animateSpreadTo(0, 180);
          setState('蓄力中');
          resultText.textContent = '蓄力中';
          resultSub.textContent = '';
          renderAll();
        } else {
          dragging = false;
          holdCollapsed = false;
        }
      });

      stage.addEventListener('pointermove', (e) => {
        if (activePointerId !== e.pointerId) return;

        const rect = stage.getBoundingClientRect();
        const px = e.clientX - rect.left;
        const py = e.clientY - rect.top;
        const pt = performance.now();

        const dt = Math.max(1, pt - lastPT);
        const vx0 = (px - lastPX) / dt;
        const vy0 = (py - lastPY) / dt;
        dragDistance += Math.hypot(px - lastPX, py - lastPY);

        if (dragging) {
          vEstX = lerp(vEstX, vx0, 0.35);
          vEstY = lerp(vEstY, vy0, 0.35);

          states.forEach((s, idx) => {
            if (holdCollapsed) {
              s.coinX = 0;
            } else {
              s.coinX = clamp(s.coinX + (px - lastPX) * 0.16, -46, 46);
            }
            s.angle += (-vy0) * 0.018 + (vx0) * 0.012 + (idx - 1) * 0.002;
          });
          renderAll();
        }

        lastPX = px;
        lastPY = py;
        lastPT = pt;
      });

      function finishPointer(e) {
        if (activePointerId !== e.pointerId) return;
        try { stage.releasePointerCapture(e.pointerId); } catch (_) {}
        activePointerId = null;

        if (groupRunning || tossHistory.length >= 6) {
          dragging = false;
          return;
        }

        if (dragging) {
          dragging = false;
          const relVx = vEstX * 1000;
          const relVy = vEstY * 1000;
          const speed = Math.hypot(relVx, relVy);

          states.forEach(s => { s.coinX = 0; });
          renderAll();

          if (speed < 260) {
            holdCollapsed = false;
            animateSpreadTo(1, 220);
            setState('待机');
            resultText.textContent = '没有起抛';
            resultSub.textContent = '';
            return;
          }

          const initVy = clamp(-relVy * 1.25, 900, 2400);
          const initVx = clamp(relVx * 0.55, -900, 900);

          let sign = Math.sign(relVx);
          if (sign === 0) sign = (csprngU32() & 1) ? 1 : -1;
          const initAvMag = clamp(speed * 0.020 + Math.abs(relVx) * 0.010, 18, 70);
          const initAv = initAvMag * sign;

          const initAngle = states[1].angle;
          const hint = ((relVx | 0) ^ ((relVy | 0) << 16) ^ ((initAngle * 1e6) | 0)) >>> 0;
          const groupSeed = csprngU32() ^ mix32(hint);

          holdCollapsed = false;
          startTripleToss({ initVy, initVx, initAv, initAngle, groupSeed });
          return;
        }

        if (dragDistance < 14) {
          const rect = stage.getBoundingClientRect();
          const px = e.clientX - rect.left;
          const py = e.clientY - rect.top;
          animateMoveAndCollapse(px, py);
          setState('收缩中');
          resultText.textContent = '已移动位置';
          resultSub.textContent = '';
        }
      }

      stage.addEventListener('pointerup', finishPointer);
      stage.addEventListener('pointercancel', finishPointer);

      btnClear.addEventListener('click', clearAll);
      btnCenter.addEventListener('click', centerCoins);

      window.addEventListener('resize', () => {
        updateBoundsAndClamp();
        renderAll();
      });

      renderHistory();
      renderHexagrams();
      renderProgress();
      updateBoundsAndClamp();
      resetCoinsPose();
      setIdleHint();
      updateButtons();
    })();
  </script>

</body>
</html>
